<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kyla Online Shop - Products</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<style>
  body { scroll-behavior: smooth; }
  .card img { height: 200px; object-fit: cover; }
  .nav-link { margin: 0 20px; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container d-flex justify-content-center">
    <a class="navbar-brand" href="index.html">Sweet Online Shop 🛒</a>
    <div class="d-flex justify-content-center">
      <a class="nav-link d-inline text-white" href="index.html">Home</a>
      <a class="nav-link d-inline text-white" href="products.html">Products</a>
    </div>
  </div>
</nav>

<section id="products" class="container mt-5 pt-5">
  <h2 class="text-center mb-4">Products</h2>

  <div class="row">
    <div class="col-md-4 mb-3">
      <div class="card">
        <img src="https://uploads.onecompiler.io/44ke2djdq/44m448fmx/chocolatemix.jpg" alt="Chocolate Box" />
        <div class="card-body text-center">
          <h5>Chocolate Box</h5>
          <p>₱299</p>
          <button class="btn btn-success" onclick="addToCart('Chocolate Box',299)">Add</button>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card">
        <img src="https://uploads.onecompiler.io/44ke2djdq/44m448fmx/brownies.jpg" alt="Brownies" />
        <div class="card-body text-center">
          <h5>Brownies 3's</h5>
          <p>₱120</p>
          <button class="btn btn-success" onclick="addToCart('Brownies',120)">Add</button>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card">
        <img src="https://uploads.onecompiler.io/44ke2djdq/44m448fmx/cookies.jpg" alt="Cookies" />
        <div class="card-body text-center">
          <h5>Cookies 6's</h5>
          <p>₱250</p>
          <button class="btn btn-success" onclick="addToCart('Cookies',250)">Add</button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="container mt-5">
  <h3>Your Cart</h3>
  <ul id="cartList"></ul>
  <h4>Total: ₱<span id="total">0</span></h4>
</section>

<section id="order" class="container mt-5 mb-5">
  <h2 class="text-center mb-4">Order Form</h2>

  <form onsubmit="submitOrder(event)">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input id="name" type="text" class="form-control" placeholder="Enter your full name" required />
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Address</label>
      <input id="address" type="text" class="form-control" placeholder="Enter your address" required />
    </div>

    <div class="mb-3">
      <label for="paymentMethod" class="form-label">Mode of Payment</label>
      <select id="paymentMethod" class="form-select" required>
        <option value="" disabled selected>Select payment method</option>
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="Credit Card">Credit Card</option>
        <option value="Gcash">Gcash</option>
        <option value="Paypal">Paypal</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary w-100">Place Order</button>
  </form>
</section>

<script>
let cart = {};
let total = 0;

function addToCart(name, price) {
  const list = document.getElementById("cartList");

  if (cart[name]) {
    cart[name].quantity++;
  } else {
    cart[name] = { price: price, quantity: 1 };
  }

  total = 0;
  list.innerHTML = '';
  for (const itemName in cart) {
    const item = cart[itemName];
    total += item.price * item.quantity;

    const li = document.createElement("li");
    li.textContent = `${itemName} (${item.quantity}) - ₱${item.price * item.quantity}`;
    list.appendChild(li);
  }
  
  document.getElementById("total").textContent = total;
}

function submitOrder(e) {
  e.preventDefault();
  alert('Order placed! Thank you.');
  // Reset cart and form
  cart = {};
  total = 0;
  document.getElementById("cartList").innerHTML = '';
  document.getElementById("total").textContent = 0;
  e.target.reset();
}
</script>

</body>
</html>
